<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXETI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MENU -->
<div class="menu" id="menu">
  <h2>EXETI</h2>
  <a href="#">🏆 Leaderboard</a>
  <a href="#">💎 Donate</a>
  <a href="#">⚙ Settings</a>
  <a href="#">📊 Stats</a>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">EXETI</div>
  <input class="search" placeholder="Search..." oninput="render()">

  <div class="burger" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter active" onclick="setFilter('all',this)">🏆 Overall</div>
  <div class="filter" onclick="setFilter('ltm',this)">⚔ LTMs</div>
  <div class="filter" onclick="setFilter('vanilla',this)">💎 Vanilla</div>
</div>

<!-- SERVER -->
<div class="server">
  <b>EXI CLUB</b>
  <div class="server-ip" onclick="copyTG()">CHANNEL TG</div>
</div>

<!-- LIST -->
<div class="container" id="list"></div>

<script src="script.js"></script>
</body>
</html>
