<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXETI</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f0f14, #050506);
  color: white;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: sticky;
  top:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  background: rgba(10,10,15,0.6);
  backdrop-filter: blur(15px);
  z-index:100;
}

.logo {
  font-size:22px;
  font-weight:bold;
  background: linear-gradient(45deg,#ff003c,#ff7a00);
  -webkit-background-clip:text;
  color:transparent;
}

/* SEARCH */
.search {
  flex:1;
  background:#1a1a22;
  border:none;
  outline:none;
  padding:10px;
  border-radius:12px;
  color:white;
}

/* BURGER */
.burger {
  width:30px;
  cursor:pointer;
}

.burger div {
  height:3px;
  background:white;
  margin:5px 0;
  border-radius:3px;
}

/* SIDEMENU */
.menu {
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#0d0d12;
  padding:20px;
  transition:.4s;
  z-index:200;
}

.menu.open {
  right:0;
}

.menu h2 {
  margin-bottom:20px;
}

.menu a {
  display:block;
  margin:10px 0;
  color:white;
  text-decoration:none;
  opacity:.7;
}

.menu a:hover {
  opacity:1;
}

/* FILTERS */
.filters {
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.filter {
  padding:10px 15px;
  background:#15151c;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}

.filter.active {
  background: linear-gradient(45deg,#ff003c,#ff7a00);
}

/* SERVER BAR */
.server {
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.server-ip {
  background:#15151c;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

/* LIST */
.container {
  padding:10px;
}

.card {
  display:flex;
  align-items:center;
  gap:10px;
  background: linear-gradient(145deg,#14141c,#0d0d12);
  padding:12px;
  border-radius:16px;
  margin-bottom:12px;
  transition:.3s;
  animation: fade .5s ease;
}

.card:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow:0 0 25px rgba(255,0,60,0.35);
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.rank {
  color:#ff4d6d;
  width:25px;
}

.avatar {
  width:50px;
  height:50px;
  border-radius:12px;
}

.info { flex:1; }

.name { font-size:16px; }

.tiers span {
  font-size:11px;
  padding:3px 6px;
  border-radius:6px;
  margin-right:4px;
}

.ht { background:#ff9800; }
.lt { background:#555; }

.region {
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
}

.na { background:#ff003c; }
.eu { background:#00c853; }

</style>
</head>

<body>

<!-- MENU -->
<div class="menu" id="menu">
  <h2>EXETI</h2>
  <a href="#">🏆 Leaderboard</a>
  <a href="#">💎 Donate</a>
  <a href="#">⚙ Settings</a>
  <a href="#">📊 Stats</a>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">EXETI</div>
  <input class="search" placeholder="Search..." oninput="render()">

  <div class="burger" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter active" onclick="setFilter('all',this)">🏆 Overall</div>
  <div class="filter" onclick="setFilter('ltm',this)">⚔ LTMs</div>
  <div class="filter" onclick="setFilter('vanilla',this)">💎 Vanilla</div>
</div>

<!-- SERVER -->
<div class="server">
  <b>EXI CLUB</b>
  <div class="server-ip" onclick="copyTG()">CHANNEL TG</div>
</div>

<!-- LIST -->
<div class="container" id="list"></div>

<script>

let players = [
 {name:"ItzReal", type:"all", region:"na", tiers:["HT1","LT2"]},
 {name:"coldifi", type:"ltm", region:"eu", tiers:["HT1"]},
 {name:"Player123", type:"vanilla", region:"na", tiers:["LT2"]},
];

let filter = "all";

function render(){
  let list = document.getElementById("list");
  let search = document.querySelector(".search").value.toLowerCase();

  list.innerHTML = "";

  players
  .filter(p => filter==="all" || p.type===filter)
  .filter(p => p.name.toLowerCase().includes(search))
  .forEach((p,i)=>{

    let tiers = p.tiers.map(t =>
      `<span class="${t.includes('HT')?'ht':'lt'}">${t}</span>`
    ).join("");

    list.innerHTML += `
    <div class="card">
      <div class="rank">${i+1}</div>
      <img class="avatar" src="https://mc-heads.net/avatar/${p.name}">
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="tiers">${tiers}</div>
      </div>
      <div class="region ${p.region}">${p.region.toUpperCase()}</div>
    </div>`;
  });
}

function setFilter(f,el){
  filter=f;
  document.querySelectorAll(".filter").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  render();
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function copyTG(){
  navigator.clipboard.writeText("exetiqueik.t.me");
  alert("Скопировано!");
}

render();

</script>

</body>
</html>
