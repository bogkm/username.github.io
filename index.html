<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXETI APP</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#050507;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  gap:10px;
  padding:10px;
  background:#0f0f15;
}

.logo {
  font-weight:bold;
  color:#ff003c;
}

.search {
  flex:1;
  background:#1a1a22;
  border:none;
  padding:8px;
  border-radius:10px;
  color:white;
}

/* BUTTON */
.add-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff003c;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
}

/* FORM */
.form {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  padding:15px;
  display:none;
}

.form input, .form select {
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* CARD */
.card {
  display:flex;
  align-items:center;
  padding:10px;
  margin:10px;
  background:#14141c;
  border-radius:12px;
}

.rank { width:25px; color:#ff003c; }

.avatar {
  width:40px;
  height:40px;
  margin:0 10px;
}

.region {
  margin-left:auto;
  padding:5px 10px;
  border-radius:8px;
}

.na { background:#ff003c; }
.eu { background:#00c853; }

</style>
</head>

<body>

<div class="header">
  <div class="logo">EXETI</div>
  <input class="search" placeholder="Search..." oninput="render()">
</div>

<div id="list"></div>

<div class="add-btn" onclick="toggleForm()">+</div>

<div class="form" id="form">
  <input id="name" placeholder="Nickname">
  <select id="type">
    <option value="all">Overall</option>
    <option value="ltm">LTMs</option>
    <option value="vanilla">Vanilla</option>
  </select>
  <select id="region">
    <option value="na">NA</option>
    <option value="eu">EU</option>
  </select>
  <input id="tiers" placeholder="HT1,LT2">
  <button onclick="addPlayer()">Добавить</button>
</div>

<script>

let players = JSON.parse(localStorage.getItem("players")||"[]");

function save(){
  localStorage.setItem("players", JSON.stringify(players));
}

function render(){
  let list = document.getElementById("list");
  let search = document.querySelector(".search").value.toLowerCase();
  list.innerHTML = "";

  players
    .filter(p => p.name.toLowerCase().includes(search))
    .forEach((p,i)=>{

      list.innerHTML += `
      <div class="card">
        <div class="rank">${i+1}</div>
        <img class="avatar" src="https://mc-heads.net/avatar/${p.name}">
        <div>${p.name}</div>
        <div class="region ${p.region}">${p.region.toUpperCase()}</div>
      </div>`;
    });
}

function addPlayer(){
  let name = document.getElementById("name").value;
  let type = document.getElementById("type").value;
  let region = document.getElementById("region").value;
  let tiers = document.getElementById("tiers").value.split(",");

  players.push({name,type,region,tiers});
  save();
  render();
  toggleForm();
}

function toggleForm(){
  let f = document.getElementById("form");
  f.style.display = f.style.display==="block" ? "none" : "block";
}

render();

</script>

</body>
</html>
